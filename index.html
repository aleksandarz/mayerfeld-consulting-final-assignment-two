<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Jumping Game</title>
    <link rel="stylesheet" href="./css/style.css">

    <script type="module" src="./js/script.js" defer></script>
</head>

<body>
    <h1>Fox in the green Dessert</h1>
    
    <div id="jump-arena">
        <button id="start-button">Start Game</button>
        <div id="points-hud">SCORE:<span id="current-tally">0</span></div>

        <div id="match-over-modal" class="hidden">
            <h1>Game Over</h1>
            <p>FINAL SCORE:<span id="final-tally">0</span></p>
            <button id="retry-action">Restart</button>
        </div>

    </div>
    <script src="js/script.js"></script>
</body>

</html>
